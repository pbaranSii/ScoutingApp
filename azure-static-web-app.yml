# Azure DevOps pipeline: build ScoutApp (Vite) and deploy to Azure Static Web Apps
# Repo: https://dev.azure.com/sii-ads-integration/Polonia/_git/scoutapp%20-%20Polonia
# Variable group "scoutapp-swadeploy" must contain: DEPLOYMENT_TOKEN, VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_APP_URL

trigger:
  - main
  - develop

variables:
  - group: scoutapp-swadeploy
  - name: app_location
    value: scoutpro
  - name: output_location
    value: dist

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Zainstaluj Node.js'

  - script: |
      cd $(app_location)
      npm ci
      npm run build
    env:
      VITE_SUPABASE_URL: $(VITE_SUPABASE_URL)
      VITE_SUPABASE_ANON_KEY: $(VITE_SUPABASE_ANON_KEY)
      VITE_APP_URL: $(VITE_APP_URL)
    displayName: 'Build aplikacji (Vite)'

  - task: AzureStaticWebApp@0
    inputs:
      app_location: $(app_location)
      output_location: $(output_location)
      azure_static_web_apps_api_token: $(DEPLOYMENT_TOKEN)
    displayName: 'Deploy do Static Web App'
